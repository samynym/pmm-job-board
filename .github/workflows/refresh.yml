name: Daily refresh

on:
  schedule:
    - cron: '0 3 * * *'   # 05:00 SAST (UTC+2)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh job data
        run: python refresh.py

      - name: Rebuild HTML
        run: python build_html.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Daily refresh: $(python -c "import json; d=json.load(open('last_refresh.json')); print(f\"{d['total']} roles, {d['new']} new\")")" || echo "nothing to commit"
          git push

      - name: Send email notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAILS: ${{ vars.NOTIFY_EMAILS }}
        run: python notify.py
